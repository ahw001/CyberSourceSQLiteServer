<!-- slot, ports, button -->
<rect class="slot" height="540" opacity=".75" rx="5" style="fill: #12151a" width="10" x="760" y="420"/>
<circle class="power" cx="330" cy="300" r="24" style="fill: none; stroke: #ffffff; stroke-width: 12"/>
<circle class="led" cx="330" cy="300" r="4" style="fill: #7ed3ff"/>
<g transform="translate(350,1120)">
<rect class="usb" height="22" rx="6" style="fill: #8a93a3" width="110" x="0" y="0"/>
<rect class="usb" height="22" rx="6" style="fill: #8a93a3" width="110" x="150" y="0"/>
</g>
<!-- front logo (two lines, second glows in accent color) -->
<text class="logo1" style="font: 900 70px 'Segoe UI', Roboto, system-ui, sans-serif; fill: #ffffff; letter-spacing: 1px; text-anchor: middle" x="550" y="900">GameConsole</text>
<text class="logo2" style="font: 800 56px 'Segoe UI', Roboto, system-ui, sans-serif; fill: #7ed3ff; text-anchor: middle; filter: url(#glow)" x="550" y="980">Max 7</text>
<!-- footer labels -->
<text x="250" y="1400">GameConsoleMax 7</text>
<text class="small" style="font: 500 24px system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #ffffff" x="250" y="1440">Front view — Black</text>
