<?xml version="1.0" encoding="utf-8"?>
<svg aria-labelledby="title desc" role="img" viewBox="0 0 1100 1600" xmlns="http://www.w3.org/2000/svg">
<title id="title">GameConsoleMax 7 — Front</title>
<desc id="desc">Generic Xbox-style tower front view, transparent background.</desc> 
<!-- glow filter for accent logo -->
<defs>
<filter height="200%" id="glow" width="200%" x="-50%" y="-50%">
<feGaussianBlur in="SourceGraphic" result="b" stdDeviation="3.5"/>
<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
</defs>
<!-- ground shadow -->
<ellipse class="shadow" cx="550" cy="1500" opacity=".45" rx="360" ry="45" style="fill: rgba(0,0,0,.25)"/>
<!-- console body -->
<rect class="tower" height="1220" rx="36" style="fill: #14181f; stroke: #2a303a; stroke-width: 10" width="600" x="250" y="140"/>
<rect class="bevel" height="1180" rx="30" style="fill: none; stroke: rgba(0,0,0,.08); stroke-width: 8" width="560" x="270" y="160"/>
<!-- vent grid -->
<g transform="translate(290,200)"> <circle class="dot" cx="20" cy="20" r="8" style="fill: #000000"/>
<circle class="dot" cx="80" cy="20" r="8" style="fill: #000000"/>
