<svg xmlns='http://www.w3.org/2000/svg' width='2400' height='1600' viewBox='0 0 2400 1600'>
    <defs>
    <!-- Vibrant diagonal gradient similar to macOS wallpapers -->
    <linearGradient id='scr_silver' x1='0%' y1='0%' x2='100%' y2='100%'>
      <stop offset='0%'   stop-color='#5E0CEB'/>
      <stop offset='45%'  stop-color='#C20E4D'/>
      <stop offset='75%'  stop-color='#FF6A00'/>
      <stop offset='100%' stop-color='#00C2FF'/>
    </linearGradient>

    <!-- Soft vignette over the screen -->
    <radialGradient id='vig_silver' cx='50%' cy='50%' r='70%'>
      <stop offset='0%' stop-color='black' stop-opacity='0'/>
      <stop offset='100%' stop-color='black' stop-opacity='0.25'/>
    </radialGradient>

    <!-- Drop-shadow for lid -->
    <filter id='lidShadow' x='-20%' y='-20%' width='140%' height='140%'>
      <feDropShadow dx='0' dy='10' stdDeviation='12' flood-color='black' flood-opacity='0.18'/>
    </filter>
  </defs>

  <!-- Lid outer -->
  <g filter='url(#lidShadow)'>
    <rect x='240' y='140' width='1920' height='1180' rx='34' fill='#C9CED8'/>
    <rect x='246' y='146'
          width='1908' height='1168'
          rx='28' fill='#D8DCE3'/>
  </g>

  <!-- Uniform bezel -->
  <rect x='240' y='140' width='1920' height='1180' rx='34'
        fill='none' stroke='#0C0E12' stroke-width='52'/>

  <!-- Notch (cut into bezel) -->
  <rect x='1105' y='140' width='190' height='58' rx='14' fill='#0C0E12'/>

  <!-- Camera dot -->
  <circle cx='1165.8' cy='170.16' r='7' fill='#1A1D22' />

  <!-- Screen panel -->
  <g>
    <rect x='266' y='166' width='1868' height='1128' rx='16' fill='url(#scr_silver)'/>
    <rect x='266' y='166' width='1868' height='1128' rx='16' fill='url(#vig_silver)'/>
    <!-- Screensaver text -->
    <g font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Ubuntu, Cantarell, 'Helvetica Neue', Arial, sans-serif" text-anchor='middle' fill='white'>
      <text x='1200' y='684.88'
            font-size='150' font-weight='700' letter-spacing='1'>LexBook</text>
      <text x='1200' y='854.08'
            font-size='120' font-weight='600' opacity='0.95'>Pro 9</text>
    </g>
  </g>

  <!-- Hinge / lip bar -->
  <g>
    <rect x='50' y='1338' width='2300' height='36' rx='14' fill='#C6CCD6'
          stroke='#B5BCC8' stroke-width='2'/>
    <!-- small center dip -->
    <rect x='1070' y='1344' width='260' height='18' rx='9' fill='#000' opacity='0.15'/>
  </g>
</svg>
