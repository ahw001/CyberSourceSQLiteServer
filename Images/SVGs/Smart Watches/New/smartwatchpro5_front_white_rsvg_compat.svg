<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img">
  <defs>
    <linearGradient id="gScreen" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#1f252f"/>
      <stop offset="1" stop-color="#0b0e14"/>
    </linearGradient>
  </defs>

  <style>
    :root{
      }
    /* Transparent canvas: no background rect */

    /* Watch components */
    .band      { fill: #e6e8eb }
    .case      { fill: #f8f8f8; stroke: #d0d3d8; stroke-width: 3 }
    .caseMetal { fill: url(#gMetal); stroke: #d0d3d8; stroke-width: 3 }
    .glass     { fill: url(#gScreen) }
    .bezel     { fill: none; stroke: #161b22; stroke-width: 10 }
    .crown     { fill: #c9cfd8 }

    /* Clock face */
    .tickH { stroke: #e9edf5; stroke-width: 6; stroke-linecap: round }
    .tickM { stroke: #e9edf5; stroke-width: 3; stroke-linecap: round; opacity: .85 }
    .handH { stroke: #e9edf5; stroke-width: 12; stroke-linecap: round }
    .handM { stroke: #e9edf5; stroke-width: 8;  stroke-linecap: round }
    .sec   { stroke: #7ed3ff;  stroke-width: 4;  stroke-linecap: round }
    .hub   { fill: #e9edf5 }

    /* Complications */
    .dateBox { fill: #e8ecf3; stroke: #b7bfcd; stroke-width: 2; rx: 6; ry: 6 }
    .dateTxt { font: 700 28px 'Segoe UI', system-ui, sans-serif; fill: #0b0d10; text-anchor: middle; dominant-baseline: middle }
    .battBG  { fill: none; stroke: rgba(255,255,255,.18); stroke-width: 8 }
    .battFG  { fill: none; stroke: #7ed3ff; stroke-width: 8; stroke-linecap: round }
    .battTxt { font: 700 22px 'Segoe UI', system-ui, sans-serif; fill: #e9edf5; text-anchor: middle; dominant-baseline: middle }
    .stepsBG { fill: none; stroke: rgba(255,255,255,.18); stroke-width: 6 }
    .stepsFG { fill: none; stroke: #e9edf5; stroke-width: 6; stroke-linecap: round }
    .stepsTxt{ font: 700 22px 'Segoe UI', system-ui, sans-serif; fill: #e9edf5; text-anchor: middle; dominant-baseline: middle }
  </style>

